name: Release macOS arm64

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (Samsung format, e.g. 3.1.3-1062)'
        required: true
      ref:
        description: 'Git ref to tag when creating a manual release'
        required: false
        default: 'master'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "Tag must not be empty" >&2
            exit 1
          fi

          if [[ "${TAG}" == *"zed"* ]]; then
            echo "Tag '${TAG}' contains forbidden suffix/prefix (zed). Use Samsung-style tags only." >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG}"

      - name: Create and push tag (manual run only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally"
          else
            git tag "${TAG}"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin"
          else
            git push origin "refs/tags/${TAG}"
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup build dependencies
        shell: bash
        run: |
          brew update
          brew install cmake llvm

      - name: Build and install netcoredbg (arm64)
        shell: bash
        run: |
          mkdir -p build
          cd build
          CC=clang CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$PWD/../netcoredbg"
          cmake --build . --config Release --target install -j"$(sysctl -n hw.ncpu)"

      - name: Package release archive
        shell: bash
        run: |
          rm -f netcoredbg-osx-arm64.tar.gz
          tar -C . -czf netcoredbg-osx-arm64.tar.gz netcoredbg
          shasum -a 256 netcoredbg-osx-arm64.tar.gz > netcoredbg-osx-arm64.tar.gz.sha256

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          make_latest: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            netcoredbg-osx-arm64.tar.gz
            netcoredbg-osx-arm64.tar.gz.sha256
          overwrite_files: true
